<!doctype html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ff4fa3"><meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./icon-192.png">
<title>LAVIES v0.3</title>
<style>
:root{--p:#ff4fa3;--o:#ff9b3d;--m:#80e4c7;--ink:#3b2431;--mut:#8b6675}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);min-height:100vh;padding:16px 16px 92px;background:radial-gradient(circle at 10% 0,#ffd8ec 0 20%,transparent 38%),radial-gradient(circle at 92% 10%,#ffddb4 0 22%,transparent 40%),radial-gradient(circle at 50% 100%,#c9fff0 0 26%,transparent 44%),linear-gradient(160deg,#fff8ee,#fff0f8 54%,#f2fff9)}
.app{max-width:540px;margin:auto}.hero,.card{border:1px solid rgba(255,255,255,.88);background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.72));box-shadow:0 18px 44px rgba(255,79,163,.18);backdrop-filter:blur(10px)}
.hero{border-radius:34px;padding:22px}.card{border-radius:28px;padding:18px;margin-top:16px}.brand{font-weight:1000;font-size:27px}.version{font-size:12px;color:#9a7483}.tag{font-size:14px;color:#7e5c6a;margin-top:4px;line-height:1.55}
.msg{margin-top:14px;padding:14px 16px;border-radius:22px;background:#fff7fb;border:1px solid #ffd1e6;color:#7b3c5e;font-weight:850;line-height:1.65}.bal-label{margin-top:20px;color:var(--mut);font-size:13px;font-weight:900}.balance{font-size:44px;font-weight:1000;letter-spacing:-.045em}.today{margin-top:14px;padding:14px 16px;border-radius:22px;background:linear-gradient(135deg,#fff,#fff3e7);border:1px solid #ffe0c2;font-weight:900}.today span{color:var(--p)}
button{border:0;border-radius:18px;padding:14px 12px;font-weight:1000;color:white;font-size:15px;background:linear-gradient(135deg,var(--p),var(--o));box-shadow:0 10px 22px rgba(255,117,78,.24)}button:active{transform:scale(.985)}.secondary{background:linear-gradient(135deg,#48cbb0,#6be0c8);color:#143c35}.ghost{background:rgba(255,255,255,.84);color:#7e5c6a;box-shadow:none;border:1px solid rgba(126,92,106,.16)}.small{font-size:13px;padding:10px;border-radius:14px;width:100%;margin-top:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
h2{font-size:18px;margin:0 0 12px}input,textarea,select{width:100%;border:1px solid #f0c9d8;border-radius:16px;padding:14px;font-size:16px;background:white;color:var(--ink);outline:none}textarea{min-height:76px}.inputs{display:grid;gap:10px}.filelabel{display:block;text-align:center;border:2px dashed #ffc4df;background:#fff7fb;border-radius:18px;padding:14px;font-weight:1000;color:#a73774}.preview{display:none;margin-top:10px;border-radius:22px;overflow:hidden}.preview img{width:100%;display:block;max-height:280px;object-fit:cover}.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pill{padding:9px 11px;border-radius:999px;background:#fff3f9;color:#a73774;font-size:13px;font-weight:900;border:1px solid #ffd1e6}
.tabs{position:fixed;left:12px;right:12px;bottom:10px;max-width:540px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;z-index:10}.nav{font-size:11px;padding:10px 4px;border-radius:18px;background:rgba(255,255,255,.93);color:#8a6672;border:1px solid #ffd1e6;box-shadow:0 12px 26px rgba(80,40,70,.12)}.nav.active{background:linear-gradient(135deg,var(--p),var(--o));color:white}.panel{display:none}.panel.active{display:block}
.history{display:grid;gap:10px;max-height:420px;overflow:auto}.item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px;border-radius:18px;background:white;border:1px solid rgba(126,92,106,.08)}.item img{width:60px;height:60px;object-fit:cover;border-radius:14px}.left{display:flex;gap:10px;align-items:center;min-width:0}.memo{font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:245px}.date{font-size:12px;color:#967382;margin-top:2px}.plus{color:#1b9b7d;font-weight:1000}.minus{color:#e24a7c;font-weight:1000}
.wishgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wish{background:#fff;border-radius:20px;overflow:hidden;border:1px solid rgba(126,92,106,.08);box-shadow:0 8px 18px rgba(80,40,70,.07)}.wish img{width:100%;height:132px;object-fit:cover;background:#fff3f9}.wishbody{padding:10px}.wishname{font-weight:1000;font-size:14px}.wishprice{color:#e24a7c;font-weight:1000;margin-top:3px;font-size:13px}.wishnote{font-size:12px;color:#876574;margin-top:4px;line-height:1.35}
.garden{margin-top:14px;height:190px;border-radius:26px;background:linear-gradient(180deg,#e9fff7,#fff7fb);border:1px solid rgba(128,228,199,.55);position:relative;overflow:hidden}.flower{position:absolute;font-size:30px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.12));animation:pop .55s ease both}@keyframes pop{from{transform:translateY(20px) scale(.65);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.morning{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:22px;z-index:40;background:radial-gradient(circle at 20% 0,#ffd8ec 0 18%,transparent 42%),radial-gradient(circle at 80% 10%,#ffddb4 0 20%,transparent 44%),linear-gradient(160deg,#fff8ee,#fff0f8 58%,#f2fff9)}.morning-card{width:min(440px,100%);text-align:center;padding:34px 22px}.morning-label{font-size:13px;color:#9a7483;font-weight:900;letter-spacing:.08em;margin-bottom:18px}.morning-word{font-size:24px;font-weight:1000;line-height:1.8;color:#5d2a45;opacity:0;animation:fadeIn 1.2s ease forwards}.morning-sub{margin-top:16px;color:#8a6672;font-weight:850;line-height:1.7;opacity:0;animation:fadeIn 1.2s ease .75s forwards}.morning-btns{margin-top:25px;display:grid;gap:10px;opacity:0;animation:fadeIn 1.2s ease 1.5s forwards}@keyframes fadeIn{to{opacity:1}}
.modal{position:fixed;inset:0;background:rgba(59,36,49,.34);display:none;align-items:center;justify-content:center;padding:22px;z-index:20}.modal-inner{width:min(420px,100%);border-radius:32px;background:white;padding:24px;text-align:center;box-shadow:0 22px 60px rgba(59,36,49,.25);animation:pop .35s ease both}.sparkles{font-size:42px}.modal h3{font-size:22px;margin:0 0 8px}.modal p{color:#7e5c6a;line-height:1.55;margin:0 0 14px;font-weight:800}
.confetti{position:fixed;pointer-events:none;inset:0;z-index:30;overflow:hidden}.confetti span{position:absolute;top:-20px;font-size:22px;animation:fall 1.4s ease-in forwards}@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}.install{display:none;margin-top:12px;padding:12px;border-radius:18px;background:#ecfff9;border:1px solid #b8f2e1;color:#246255;font-weight:850;line-height:1.5}.footer{font-size:12px;color:#9a7483;text-align:center;margin:18px 0 8px}
</style></head><body>
<div class="morning" id="morning"><div class="morning-card"><div class="morning-label">TODAY'S LIGHT</div><div class="morning-word" id="morningWord"></div><div class="morning-sub">この言葉は、今日だけの贈り物です。<br>数字を見る前に、まず自分の存在に戻ります。</div><div class="morning-btns"><button onclick="enterApp()">今日を受け取る</button><button class="ghost" onclick="skipMorning()">あとで見る</button></div></div></div>
<main class="app"><section class="hero"><div class="brand">LAVIES <span class="version">v0.3</span></div><div class="tag">自分に帰ってくる、毎朝の小さな庭。</div><div class="msg" id="message"></div><div class="bal-label">LOVELY BANK 残高</div><div class="balance" id="balance">¥0</div><div class="today">Day <span id="day">1</span>｜本日の振込予定 <span id="deposit">¥100,000</span></div><div class="row"><button onclick="receiveToday()">入金を受け取る</button><button class="secondary" onclick="spend()">買う</button></div><div class="row"><button class="ghost" onclick="resetToday()">今日をやり直す</button><button class="ghost" onclick="resetAll()">全リセット</button></div><div class="install" id="installHint">Safariで開いて、共有ボタン →「ホーム画面に追加」でアプリみたいに使えるよ🌷</div></section>
<section class="card panel active" id="panelHome"><h2>今日、何を受け取る？</h2><div class="inputs"><input id="memo" placeholder="例：海沿いドライブ、ホテルステイ、アート…"><input id="amount" inputmode="numeric" placeholder="金額：例 350000"><label class="filelabel">写真を選ぶ<input id="photo" type="file" accept="image/*" style="display:none" onchange="previewPhoto(event)"></label></div><div class="preview" id="preview"><img id="previewImg"></div><div class="quick"><div class="pill" onclick="setSpend('海が見えるホテル',80000)">ホテル</div><div class="pill" onclick="setSpend('最高にときめく服',50000)">服</div><div class="pill" onclick="setSpend('オープンカードライブ旅',120000)">旅</div><div class="pill" onclick="setSpend('大切な人へのギフト',30000)">ギフト</div></div></section>
<section class="card panel" id="panelGarden"><h2>JOY GARDEN</h2><div class="tag">帰ってくるたび、あなたの庭に花が咲きます。</div><div class="garden" id="garden"></div></section>
<section class="card panel" id="panelWish"><h2>波動的準備部屋</h2><div class="inputs"><input id="wishName" placeholder="欲しいもの：例 海の見える家"><input id="wishAmount" inputmode="numeric" placeholder="金額：例 50000000"><textarea id="wishNote" placeholder="この何が好き？どんな感覚を受け取りたい？"></textarea><label class="filelabel">写真を置く<input id="wishPhoto" type="file" accept="image/*" style="display:none"></label><button onclick="addWish()">準備部屋に置く</button></div><div class="wishgrid" id="wishGrid" style="margin-top:14px"></div></section>
<section class="card panel" id="panelBook"><h2>通帳</h2><div class="history" id="history"></div></section>
<section class="card panel" id="panelSettings"><h2>設定</h2><div class="inputs"><label>1日の始まり時間</label><select id="startHour" onchange="saveSettings()"><option value="3">3:00</option><option value="4">4:00</option><option value="5">5:00</option><option value="6">6:00</option><option value="7">7:00</option></select><button onclick="showMorning(true)">今日の入口をプレビュー</button></div></section>
<div class="footer">これはイメージワーク用の架空口座です。現実の銀行・資産管理とは連動しません。</div></main>
<div class="tabs"><button class="nav active" id="navHome" onclick="showPanel('Home')">受け取る</button><button class="nav" id="navGarden" onclick="showPanel('Garden')">庭</button><button class="nav" id="navWish" onclick="showPanel('Wish')">準備</button><button class="nav" id="navBook" onclick="showPanel('Book')">通帳</button><button class="nav" id="navSettings" onclick="showPanel('Settings')">設定</button></div>
<div class="modal" id="modal" onclick="closeModal()"><div class="modal-inner" onclick="event.stopPropagation()"><div class="sparkles">✨🌷✨</div><h3 id="modalTitle">入金完了</h3><p id="modalText"></p><button onclick="closeModal()">受け取った</button></div></div><div class="confetti" id="confetti"></div>
<script>
const yen=n=>"¥"+Number(n||0).toLocaleString("ja-JP"),key="lavies-v03";let state=JSON.parse(localStorage.getItem(key)||'{"day":1,"balance":0,"receivedToday":false,"history":[],"wishes":[],"flowers":0,"lastMorningKey":"","startHour":4}'),currentPhoto="";
const messages=["あなたの中には、今日も新しい可能性が息づいています。","今日も、あなたのペースで大丈夫。","豊かさは、あなたの安心の中でひらいていきます。","望みは、あなたの中の生命力が動いている証。","あなたは、世界にひとつだけのオーダーメイド。","今日のあなたには、まだ出会っていない喜びがあります。","人生は今日も、あなたをやさしく迎えています。"];
const morningWords=["あなたの中には、今日も新しい可能性が息づいています。","今日という一日に、少し心をひらいてみる。","あなたのJOYは、ちゃんと世界と響き合っています。","安心の中で、望みは自然に育っていきます。","今日もあなたの中に、あたたかい創造の力があります。","あなたは、あなたのためだけに用意された一日を生きています。","今ここから、やさしい豊かさを受け取ります。"];
function dayKey(){const d=new Date(),h=Number(state.startHour||4);if(d.getHours()<h)d.setDate(d.getDate()-1);return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}function maybeShowMorning(){if(state.lastMorningKey!==dayKey())showMorning(false)}function showMorning(preview=false){morningWord.textContent=(preview?"プレビュー｜":"")+morningWords[(state.day-1)%morningWords.length];morning.style.display="flex"}function enterApp(){state.lastMorningKey=dayKey();save();morning.style.display="none"}function skipMorning(){morning.style.display="none"}function save(){localStorage.setItem(key,JSON.stringify(state));render()}function todayDeposit(){return state.day*100000}function vibrate(p=[35,45,35]){if(navigator.vibrate)navigator.vibrate(p)}
function playChime(){try{const C=window.AudioContext||window.webkitAudioContext,ctx=new C(),notes=[880,1174.66,1567.98,2093];notes.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime+i*.075);g.gain.linearRampToValueAtTime(.10,ctx.currentTime+i*.075+.012);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.075+.22);o.connect(g).connect(ctx.destination);o.start(ctx.currentTime+i*.075);o.stop(ctx.currentTime+i*.075+.24)})}catch(e){}}
function confetti(){const c=document.querySelector(".confetti");c.innerHTML="";["🌷","✨","🌸","💛","🌼","✨","🌷","💫"].forEach(s=>{const el=document.createElement("span");el.textContent=s;el.style.left=(8+Math.random()*84)+"%";el.style.animationDelay=(Math.random()*.25)+"s";c.appendChild(el)});setTimeout(()=>c.innerHTML="",1600)}
function showModal(t,txt){modalTitle.textContent=t;modalText.textContent=txt;modal.style.display="flex"}function closeModal(){modal.style.display="none"}function readFile(file){return new Promise((res,rej)=>{if(!file){res("");return}const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file)})}async function previewPhoto(e){currentPhoto=await readFile(e.target.files[0]);if(currentPhoto){previewImg.src=currentPhoto;preview.style.display="block"}}
function render(){balance.textContent=yen(state.balance);day.textContent=state.day;deposit.textContent=yen(todayDeposit());message.textContent=messages[(state.day-1)%messages.length];startHour.value=state.startHour||4;garden.innerHTML="";const fs=["🌷","🌸","🌼","🌻","🌺","🪻","🌹"];for(let i=0;i<Math.min(state.flowers||0,40);i++){let f=document.createElement("div");f.className="flower";f.textContent=fs[i%fs.length];f.style.left=(6+(i*11)%86)+"%";f.style.bottom=(12+(i%4)*32)+"px";f.style.animationDelay=(i*.025)+"s";garden.appendChild(f)}history.innerHTML=state.history.length?state.history.map(x=>`<div class="item"><div class="left">${x.photo?`<img src="${x.photo}">`:""}<div><div class="memo">${esc(x.memo)}</div><div class="date">${x.date}</div></div></div><div class="${x.amount>=0?'plus':'minus'}">${x.amount>=0?'+':'-'}${yen(Math.abs(x.amount))}</div></div>`).join(""):'<div class="item"><div><div class="memo">まだ通帳はまっさら🌷</div><div class="date">まずは今日の入金を受け取ってみてね</div></div></div>';wishGrid.innerHTML=state.wishes.length?state.wishes.map((x,i)=>`<div class="wish">${x.photo?`<img src="${x.photo}">`:`<img alt="">`}<div class="wishbody"><div class="wishname">${esc(x.name)}</div><div class="wishprice">${yen(x.amount)}</div><div class="wishnote">${esc(x.note||"")}</div><button class="small" onclick="buyWish(${i})">これを買う</button><button class="ghost small" onclick="deleteWish(${i})">削除</button></div></div>`).join(""):'<div class="item" style="grid-column:1/-1"><div><div class="memo">まだ準備部屋は空っぽ🌱</div><div class="date">欲しい世界の写真を置いてみてね</div></div></div>';installHint.style.display=(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone)?"none":"block"}
function receiveToday(){if(state.receivedToday){vibrate([20]);showModal("今日は受け取り済み","また明日、新しい豊かさを受け取ろう🌷");return}const a=todayDeposit();state.balance+=a;state.history.unshift({memo:`Day ${state.day} 宇宙銀行からの振込`,amount:a,date:new Date().toLocaleString("ja-JP"),photo:""});state.receivedToday=true;state.day+=1;state.flowers=(state.flowers||0)+1;save();vibrate([40,40,70]);playChime();confetti();showModal("入金完了",`${yen(a)} を受け取りました。今日は何を受け取りますか？`)}
function setSpend(m,a){memo.value=m;amount.value=a}function spend(){const m=memo.value.trim()||"JOYなお買い物",a=Number(String(amount.value).replace(/[^\d]/g,""));if(!a){showModal("金額を入れてね","受け取りたいものを、気持ちよく選ぼう🌷");return}state.balance-=a;state.history.unshift({memo:m,amount:-a,date:new Date().toLocaleString("ja-JP"),photo:currentPhoto});memo.value="";amount.value="";photo.value="";currentPhoto="";preview.style.display="none";save();vibrate([25,35,25]);playChime();confetti();showModal("受け取り完了",`${m} を受け取りました。`)}
async function addWish(){const n=wishName.value.trim(),a=Number(String(wishAmount.value).replace(/[^\d]/g,"")),note=wishNote.value.trim(),ph=await readFile(wishPhoto.files[0]);if(!n||!a){showModal("準備部屋に置けないよ","欲しいものと金額を入れてね🌷");return}state.wishes.unshift({name:n,amount:a,note,photo:ph,date:new Date().toLocaleString("ja-JP")});wishName.value="";wishAmount.value="";wishNote.value="";wishPhoto.value="";save();vibrate([25]);showModal("準備完了",`${n} を波動的準備部屋に置きました。`)}
function buyWish(i){const x=state.wishes[i];if(!confirm(`${x.name} を ${yen(x.amount)} で受け取る？`))return;state.balance-=x.amount;state.history.unshift({memo:x.name,amount:-x.amount,date:new Date().toLocaleString("ja-JP"),photo:x.photo});state.wishes.splice(i,1);save();vibrate([35,35,50]);playChime();confetti();showModal("受け取り完了",`${x.name} があなたの通帳に入りました。`)}function deleteWish(i){if(confirm("準備部屋から削除する？")){state.wishes.splice(i,1);save()}}function resetToday(){state.receivedToday=false;save()}function resetAll(){if(confirm("全部リセットして、Day1から始める？")){state={day:1,balance:0,receivedToday:false,history:[],wishes:[],flowers:0,lastMorningKey:"",startHour:4};localStorage.removeItem(key);render();maybeShowMorning()}}function saveSettings(){state.startHour=Number(startHour.value);save()}function showPanel(n){["Home","Garden","Wish","Book","Settings"].forEach(x=>{document.getElementById("panel"+x).classList.toggle("active",x===n);document.getElementById("nav"+x).classList.toggle("active",x===n)})}function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}render();setTimeout(maybeShowMorning,450);
</script></body></html>
